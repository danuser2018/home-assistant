services:

  interaction-manager:
    image: danuser2018/interaction-manager:latest
    container_name: interaction-manager
    environment:
      STT_BASE_URL: http://stt:8000
      ORCHESTRATOR_BASE_URL: http://orchestrator:8000
      TTS_BASE_URL: http://tts:8000
      INPUT_DIR: /data/input
      PROCESSING_DIR: /data/processing
      OUTPUT_DIR: /data/output
      ERROR_DIR: /data/error
      POLL_INTERVAL_SECONDS: 1
      DEFAULT_LANGUAGE: es
      LOG_LEVEL: INFO
    volumes:
      - ./data:/data
    restart: unless-stopped
    depends_on:
      - stt
      - orchestrator
      - tts
    networks:
      - assistant-net

  stt:
    image: danuser2018/stt-capability:latest
    container_name: stt-capability
    env_file:
      - config/assistant.env
    ports:
      - "8001:8000"  # Expuesto para healthcheck y depuración local
    restart: unless-stopped
    volumes:
      - ./models/stt:/root/.cache/huggingface
    networks:
      - assistant-net

  orchestrator:
    image: danuser2018/orchestrator:latest
    container_name: orchestrator
    env_file:
      - config/assistant.env
    environment:
      SYSTEM_SERVICE_BASE_URL: http://system-service:8000
    volumes:
      - ./data/mail:/shared/mail
    ports:
      - "8002:8000"  # Expuesto para healthcheck y depuración local
    restart: unless-stopped
    depends_on:
      - system-service
    networks:
      - assistant-net

  system-service:
    image: danuser2018/system-service:latest
    container_name: system-service
    env_file:
      - config/assistant.env
    ports:
      - "8004:8000"  # Expuesto para healthcheck y depuración local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - assistant-net

  tts:
    image: danuser2018/tts-capability:latest
    container_name: tts-capability
    env_file:
      - config/assistant.env
    ports:
      - "8003:8000"  # Expuesto para healthcheck y depuración local
    restart: unless-stopped
    networks:
      - assistant-net

  mail-watchdog:
    image: danuser2018/mail-watchdog:latest
    container_name: mail-watchdog
    env_file:
      - config/assistant.env
    volumes:
      - ./data/mail:/shared/mail
    restart: unless-stopped
    networks:
      - assistant-net

networks:
  assistant-net:
    driver: bridge

