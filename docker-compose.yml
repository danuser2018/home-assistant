services:

  interaction-manager:
    image: danuser2018/interaction-manager:latest
    container_name: interaction-manager
    env_file:
      - config/interaction-manager.env
    environment:
      STT_BASE_URL: http://stt:8000
      ORCHESTRATOR_BASE_URL: http://orchestrator:8000
      TTS_BASE_URL: http://tts:8000
      INPUT_DIR: /data/input
      PROCESSING_DIR: /data/processing
      OUTPUT_DIR: /data/output
      ERROR_DIR: /data/error
    volumes:
      - ./data:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    depends_on:
      - stt
      - orchestrator
      - tts
    networks:
      - assistant-network

  stt:
    image: danuser2018/stt-capability:latest
    container_name: stt-capability
    env_file:
      - config/stt-capability.env
    ports:
      - "8001:8000"  # Expuesto para healthcheck y depuración local
    restart: unless-stopped
    volumes:
      - ./models/stt:/root/.cache/huggingface
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - assistant-network

  orchestrator:
    image: danuser2018/orchestrator:latest
    container_name: orchestrator
    env_file:
      - config/orchestrator.env
    environment:
      SYSTEM_SERVICE_BASE_URL: http://system-service:8000
      MAIL_PENDING_DIR: /shared/mail/pending
      WEATHER_SERVICE_BASE_URL: http://weather-service:8000
      CALENDAR_SERVICE_BASE_URL: http://calendar-service:8000
      HOST_SERVICE_BASE_URL: http://host.docker.internal:8007
      NATS_URL: nats://nats:4222
      CONTEXT_SERVICE_BASE_URL: http://context-service:8000
    volumes:
      - ./data/mail:/shared/mail
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "8002:8000"  # Expuesto para healthcheck y depuración local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      system-service:
        condition: service_started
      weather-service:
        condition: service_healthy
      calendar-service:
        condition: service_healthy
      nats:
        condition: service_healthy
      context-service:
        condition: service_healthy
    networks:
      - assistant-network

  system-service:
    image: danuser2018/system-service:latest
    container_name: system-service
    env_file:
      - config/system-service.env
    ports:
      - "8004:8000"  # Expuesto para healthcheck y depuración local
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - assistant-network

  tts:
    image: danuser2018/tts-capability:latest
    container_name: tts-capability
    env_file:
      - config/tts-capability.env
    ports:
      - "8003:8000"  # Expuesto para healthcheck y depuración local
    volumes:
      - ./models/tts:/app/models
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    networks:
      - assistant-network

  mail-watchdog:
    image: danuser2018/mail-watchdog:latest
    container_name: mail-watchdog
    env_file:
      - config/mail-watchdog.env
    environment:
      IDENTITY_SERVICE_BASE_URL: http://identity-service:8000
    volumes:
      - ./data/mail:/shared/mail
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    depends_on:
      identity-service:
        condition: service_healthy
    networks:
      - assistant-network

  identity-service:
    image: danuser2018/identity-service:latest
    container_name: identity-service
    env_file:
      - config/identity-service.env
    ports:
      - "8005:8000"  # Expuesto para healthcheck y depuración local
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - assistant-network

  weather-service:
    image: danuser2018/weather-service:latest
    container_name: weather-service
    env_file:
      - config/weather-service.env
    environment:
      PORT: 8000
      HOST: 0.0.0.0
    ports:
      - "8006:8000"  # Exposed for healthcheck and local debugging
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - assistant-network

  calendar-service:
    image: danuser2018/calendar-service:latest
    container_name: calendar-service

    env_file:
      - config/calendar-service.env
    ports:
      - "8008:8000"  # Exposed for healthcheck and local debugging
    restart: unless-stopped
    volumes:
      - ./calendar-data:/app/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - assistant-network

  context-service:
    image: danuser2018/context-service:latest
    container_name: context-service
    env_file:
      - config/context-service.env
    environment:
      NATS_URL: nats://nats:4222
    ports:
      - "8009:8000"  # Expuesto para healthcheck y depuración local
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - assistant-network

  nats:

    image: nats:2.10-alpine
    container_name: nats
    command: "-m 8222"  # Habilita el puerto de monitoreo interno para el healthcheck
    ports:
      - "4222:4222"     # Puerto de clientes expuesto al host para desarrollo y depuración
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - assistant-network

networks:
  assistant-network:
    driver: bridge

