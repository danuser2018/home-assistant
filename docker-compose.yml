services:

  interaction-manager:
    image: danuser2018/interaction-manager:latest
    container_name: interaction-manager
    env_file:
      - config/interaction-manager.env
    environment:
      STT_BASE_URL: http://stt:8000
      ORCHESTRATOR_BASE_URL: http://orchestrator:8000
      TTS_BASE_URL: http://tts:8000
      INPUT_DIR: /data/input
      PROCESSING_DIR: /data/processing
      OUTPUT_DIR: /data/output
      ERROR_DIR: /data/error
    volumes:
      - ./data:/data
    restart: unless-stopped
    depends_on:
      - stt
      - orchestrator
      - tts
    networks:
      - assistant-network

  stt:
    image: danuser2018/stt-capability:latest
    container_name: stt-capability
    env_file:
      - config/stt-capability.env
    ports:
      - "8001:8000"  # Expuesto para healthcheck y depuración local
    restart: unless-stopped
    volumes:
      - ./models/stt:/root/.cache/huggingface
    networks:
      - assistant-network

  orchestrator:
    image: danuser2018/orchestrator:latest
    container_name: orchestrator
    env_file:
      - config/orchestrator.env
    environment:
      SYSTEM_SERVICE_BASE_URL: http://system-service:8000
      MAIL_PENDING_DIR: /shared/mail/pending
      WEATHER_SERVICE_BASE_URL: http://weather-service:8000
    volumes:
      - ./data/mail:/shared/mail
    ports:
      - "8002:8000"  # Expuesto para healthcheck y depuración local
    restart: unless-stopped
    depends_on:
      system-service:
        condition: service_started
      weather-service:
        condition: service_healthy
    networks:
      - assistant-network

  system-service:
    image: danuser2018/system-service:latest
    container_name: system-service
    env_file:
      - config/system-service.env
    ports:
      - "8004:8000"  # Expuesto para healthcheck y depuración local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - assistant-network

  tts:
    image: danuser2018/tts-capability:latest
    container_name: tts-capability
    env_file:
      - config/tts-capability.env
    ports:
      - "8003:8000"  # Expuesto para healthcheck y depuración local
    volumes:
      - ./models/tts:/app/models
    restart: unless-stopped
    networks:
      - assistant-network

  mail-watchdog:
    image: danuser2018/mail-watchdog:latest
    container_name: mail-watchdog
    env_file:
      - config/mail-watchdog.env
    environment:
      IDENTITY_SERVICE_BASE_URL: http://identity-service:8000
    volumes:
      - ./data/mail:/shared/mail
    restart: unless-stopped
    depends_on:
      identity-service:
        condition: service_healthy
    networks:
      - assistant-network

  identity-service:
    image: danuser2018/identity-service:latest
    container_name: identity-service
    env_file:
      - config/identity-service.env
    ports:
      - "8005:8000"  # Expuesto para healthcheck y depuración local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - assistant-network

  weather-service:
    image: danuser2018/weather-service:latest
    container_name: weather-service
    env_file:
      - config/weather-service.env
    environment:
      PORT: 8000
      HOST: 0.0.0.0
    ports:
      - "8006:8000"  # Exposed for healthcheck and local debugging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - assistant-network

networks:
  assistant-network:
    driver: bridge

